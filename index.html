<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Modern Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #141e30, #243b55);
        }

        .calculator {
            width: 320px;
            background-color: #1e222b;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .display {
            background-color: #0f1115;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: right;
            word-wrap: break-word;
            word-break: break-all;
        }

        .previous-operand {
            color: #6c757d;
            font-size: 1.1rem;
            min-height: 24px;
            margin-bottom: 5px;
        }

        .current-operand {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 500;
            overflow-x: auto;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn {
            border: none;
            outline: none;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            background-color: #2c313c;
            color: #ffffff;
            transition: all 0.1s ease;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:hover {
            background-color: #3e4451;
        }

        .operator {
            background-color: #ff9f0a;
            color: #ffffff;
        }

        .operator:hover {
            background-color: #cc7f08;
        }

        .clear, .delete {
            background-color: #a5a5a5;
            color: #000000;
        }

        .clear:hover, .delete:hover {
            background-color: #8e8e8e;
        }

        .equal {
            grid-row: span 2;
            background-color: #30d158;
            color: #ffffff;
        }

        .equal:hover {
            background-color: #24a844;
        }

        .zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display">
            <div class="previous-operand" id="preview"></div>
            <div class="current-operand" id="screen">0</div>
        </div>
        <div class="buttons">
            <button class="btn clear" onclick="clearScreen()">AC</button>
            <button class="btn delete" onclick="deleteNumber()">DEL</button>
            <button class="btn operator" onclick="appendOperator('÷')">÷</button>
            <button class="btn operator" onclick="appendOperator('×')">×</button>

            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
            <button class="btn operator" onclick="appendOperator('−')">−</button>

            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            <button class="btn operator" onclick="appendOperator('+')">+</button>

            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            <button class="btn equal" onclick="calculate()">=</button>

            <button class="btn zero" onclick="appendNumber('0')">0</button>
            <button class="btn" onclick="appendNumber('.')">.</button>
        </div>
    </div>

    <script>
        const screen = document.getElementById('screen');
        const preview = document.getElementById('preview');

        let currentInput = '0';
        let resetScreen = false;

        function appendNumber(number) {
            if (currentInput === '0' || resetScreen) {
                currentInput = number;
                resetScreen = false;
            } else {
                // Prevent inputting multiple decimals inside a single ongoing number chunk
                if (number === '.' && currentInput.split(/[\+\−\×\÷]/).pop().includes('.')) return;
                currentInput += number;
            }
            updateDisplay();
            updatePreview();
        }

        function appendOperator(operator) {
            if (resetScreen) resetScreen = false;
            
            const lastChar = currentInput.trim().slice(-1);
            
            // Swap operator smoothly if user changes mind mid-operation
            if (['+', '−', '×', '÷'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + operator;
            } else {
                currentInput += operator;
            }
            updateDisplay();
        }

        function clearScreen() {
            currentInput = '0';
            preview.innerText = '';
            updateDisplay();
        }

        function deleteNumber() {
            if (currentInput.length <= 1 || resetScreen) {
                currentInput = '0';
                resetScreen = false;
            } else {
                currentInput = currentInput.slice(0, -1);
            }
            updateDisplay();
            updatePreview();
        }

        function updateDisplay() {
            screen.innerText = currentInput;
        }

        // Live computing preview calculation engine
        function updatePreview() {
            const lastChar = currentInput.trim().slice(-1);
            if (['+', '−', '×', '÷', '.'].includes(lastChar) || currentInput === '0') {
                return;
            }
            
            if (/[\+\−\×\÷]/.test(currentInput)) {
                try {
                    preview.innerText = calculateExpression(currentInput);
                } catch (e) {
                    preview.innerText = '';
                }
            } else {
                preview.innerText = '';
            }
        }

        function calculate() {
            try {
                const result = calculateExpression(currentInput);
                preview.innerText = currentInput + ' =';
                currentInput = result.toString();
                resetScreen = true;
                updateDisplay();
            } catch (error) {
                screen.innerText = 'Error';
                currentInput = '0';
                resetScreen = true;
            }
        }

        // Safe isolated parsing engine substituting dangerous standard eval() APIs
        function calculateExpression(expression) {
            let formattedExpression = expression
                .replace(/×/g, '*')
                .replace(/−/g, '-')
                .replace(/÷/g, '/');
            
            let result = new Function(`return ${formattedExpression}`)();
            
            // Fixes float precision anomalies (e.g., 0.1 + 0.2 rendering accurately)
            if (result % 1 !== 0) {
                result = Math.round(result * 100000000) / 100000000;
            }
            return result;
        }

        // Keyboard support listener mapping
        document.addEventListener('keydown', (event) => {
            const key = event.key;
            
            if ((key >= '0' && key <= '9') || key === '.') {
                appendNumber(key);
            } else if (key === '+') {
                appendOperator('+');
            } else if (key === '-') {
                appendOperator('−');
            } else if (key === '*') {
                appendOperator('×');
            } else if (key === '/') {
                event.preventDefault(); // Prevents built-in browser quick-search shortcuts
                appendOperator('÷');
            } else if (key === 'Enter' || key === '=') {
                calculate();
            } else if (key === 'Backspace') {
                deleteNumber();
            } else if (key === 'Escape') {
                clearScreen();
            }
        });
    </script>
</body>
</html>
